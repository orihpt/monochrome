name: Run Tests

on:
    push:
        branches: ['*']
    pull_request:
        branches: ['*']
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'yarn'

            - name: Install dependencies
              run: |
                  corepack enable
                  yarn install --immutable

            - name: Install playwright dependencies
              run: yarn install:playwright

            - name: Run vitest
              run: yarn test:headless
